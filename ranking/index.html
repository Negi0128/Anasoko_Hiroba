<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ランキング - Anasokoひろば</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Yu Gothic UI", sans-serif;
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 16px 64px;
    line-height: 1.6;
  }
  h1 { font-size: 1.3rem; }
  h2 { font-size: 1.05rem; margin-top: 32px; }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tabs button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #8884;
    background: transparent;
    font-size: 0.95rem;
  }
  .tabs button.active {
    background: #3498db;
    color: white;
    border-color: #3498db;
  }
  input[type="search"] {
    width: 100%;
    font-size: 1rem;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #8884;
    box-sizing: border-box;
    margin-bottom: 12px;
  }
  .song-item {
    padding: 10px 12px;
    border: 1px solid #8884;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
  }
  .song-item .genre { font-size: 0.8rem; color: #888; }
  .course-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin: 12px 0;
  }
  .course-tabs button {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #8884;
    background: transparent;
  }
  .course-tabs button.active {
    background: #f1c40f;
    border-color: #f1c40f;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 8px 6px;
    border-bottom: 1px solid #8884;
    font-size: 0.9rem;
  }
  th:last-child, td:last-child { text-align: right; }
  .rank-1 { color: #f1c40f; font-weight: bold; }
  .hint { font-size: 0.85rem; color: #888; }
  .recent-item {
    padding: 8px 0;
    border-bottom: 1px solid #8884;
    font-size: 0.9rem;
  }
  .recent-item .meta { font-size: 0.8rem; color: #888; }
  #backButton {
    background: transparent;
    border: none;
    color: #3498db;
    font-size: 0.95rem;
    padding: 4px 0;
    margin-bottom: 8px;
  }
</style>
</head>
<body>
  <h1>Anasokoひろば ランキング</h1>

  <div class="tabs">
    <button id="tabRanking" class="active">ランキング</button>
    <button id="tabRecent">最近の更新</button>
  </div>

  <div id="rankingPane">
    <div id="searchView">
      <input type="search" id="songSearch" placeholder="曲名で検索">
      <div id="songList" class="hint">曲名を入力してください。</div>
    </div>

    <div id="detailView" style="display:none;">
      <button id="backButton">← 検索に戻る</button>
      <h2 id="selectedSongName"></h2>
      <div class="course-tabs" id="courseTabs"></div>
      <table id="rankTable">
        <thead>
          <tr><th>順位</th><th>PC名</th><th>スコア</th></tr>
        </thead>
        <tbody id="rankTableBody"></tbody>
      </table>
      <div id="rankStatus" class="hint"></div>
    </div>
  </div>

  <div id="recentPane" style="display:none;">
    <div id="recentList" class="hint">読み込み中...</div>
  </div>

  <script>
    // App.config の SupabaseUrl / SupabaseAnonKey と同じ値。
    // このページは読み取り専用（scores テーブルへのSELECTのみ）で使用します。
    const SUPABASE_URL = "https://ycrrinkhjphpnxdaxjcy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_lZcE91oagqwcz8A9SqZHSg_PBQ2j389";

    const COURSE_NAMES = ["簡単", "普通", "難しい", "おに", "裏"];

    async function supabaseGet(query) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/scores?${query}`, {
        headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` },
      });
      if (!res.ok) throw new Error(`読み込みに失敗しました (HTTP ${res.status})`);
      return res.json();
    }

    // --- タブ切り替え ---
    const tabRanking = document.getElementById("tabRanking");
    const tabRecent = document.getElementById("tabRecent");
    const rankingPane = document.getElementById("rankingPane");
    const recentPane = document.getElementById("recentPane");

    tabRanking.addEventListener("click", () => {
      tabRanking.classList.add("active");
      tabRecent.classList.remove("active");
      rankingPane.style.display = "";
      recentPane.style.display = "none";
    });
    tabRecent.addEventListener("click", () => {
      tabRecent.classList.add("active");
      tabRanking.classList.remove("active");
      recentPane.style.display = "";
      rankingPane.style.display = "none";
      loadRecent();
    });

    // --- 曲名検索 ---
    const songSearch = document.getElementById("songSearch");
    const songList = document.getElementById("songList");
    const searchView = document.getElementById("searchView");
    const detailView = document.getElementById("detailView");
    const selectedSongName = document.getElementById("selectedSongName");
    const courseTabs = document.getElementById("courseTabs");
    const rankTableBody = document.getElementById("rankTableBody");
    const rankStatus = document.getElementById("rankStatus");
    const backButton = document.getElementById("backButton");

    let searchTimer = null;
    songSearch.addEventListener("input", () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(runSearch, 300);
    });

    async function runSearch() {
      const query = songSearch.value.trim();
      if (query.length === 0) {
        songList.textContent = "曲名を入力してください。";
        return;
      }
      songList.textContent = "検索中...";
      try {
        const rows = await supabaseGet(
          `song_name=ilike.*${encodeURIComponent(query)}*&select=title,song_name,genre&order=song_name.asc&limit=200`
        );
        const uniqueSongs = new Map();
        for (const row of rows) {
          if (!uniqueSongs.has(row.title)) uniqueSongs.set(row.title, row);
        }
        if (uniqueSongs.size === 0) {
          songList.textContent = "該当する曲が見つかりませんでした。";
          return;
        }
        songList.innerHTML = "";
        for (const song of uniqueSongs.values()) {
          const div = document.createElement("div");
          div.className = "song-item";
          div.innerHTML = `${song.song_name || song.title}<div class="genre">${song.genre || ""}</div>`;
          div.addEventListener("click", () => showSong(song));
          songList.appendChild(div);
        }
      } catch (err) {
        songList.textContent = err.message;
      }
    }

    function showSong(song) {
      searchView.style.display = "none";
      detailView.style.display = "";
      selectedSongName.textContent = song.song_name || song.title;

      courseTabs.innerHTML = "";
      COURSE_NAMES.forEach((name, course) => {
        const btn = document.createElement("button");
        btn.textContent = name;
        btn.addEventListener("click", () => selectCourse(song.title, course, btn));
        courseTabs.appendChild(btn);
      });
      // 最初のコース（簡単）を初期表示
      selectCourse(song.title, 0, courseTabs.children[0]);
    }

    backButton.addEventListener("click", () => {
      detailView.style.display = "none";
      searchView.style.display = "";
    });

    async function selectCourse(hash, course, activeButton) {
      for (const btn of courseTabs.children) btn.classList.remove("active");
      activeButton.classList.add("active");

      rankTableBody.innerHTML = "";
      rankStatus.textContent = "読み込み中...";

      try {
        const rows = await supabaseGet(
          `title=eq.${encodeURIComponent(hash)}&course=eq.${course}&select=score,source_pc&order=score.desc&limit=1000`
        );

        // PCごとの自己ベストだけを残す（historyには途中経過の更新も全件残っているため）
        const bestByPc = new Map();
        for (const row of rows) {
          const pc = row.source_pc || "不明";
          if (!bestByPc.has(pc) || bestByPc.get(pc) < row.score) {
            bestByPc.set(pc, row.score);
          }
        }
        const ranking = [...bestByPc.entries()].sort((a, b) => b[1] - a[1]);

        if (ranking.length === 0) {
          rankStatus.textContent = "このコースのスコアはまだ登録されていません。";
          return;
        }
        rankStatus.textContent = "";
        ranking.forEach(([pc, score], i) => {
          const tr = document.createElement("tr");
          const rankCell = i === 0 ? `<td class="rank-1">${i + 1}</td>` : `<td>${i + 1}</td>`;
          tr.innerHTML = `${rankCell}<td>${pc}</td><td>${score.toLocaleString()}</td>`;
          rankTableBody.appendChild(tr);
        });
      } catch (err) {
        rankStatus.textContent = err.message;
      }
    }

    // --- 最近の更新 ---
    const recentList = document.getElementById("recentList");
    let recentLoaded = false;

    async function loadRecent() {
      if (recentLoaded) return;
      recentLoaded = true;
      try {
        const rows = await supabaseGet(
          "select=song_name,title,course,score,source_pc,created_at&order=created_at.desc&limit=30"
        );
        if (rows.length === 0) {
          recentList.textContent = "まだ記録がありません。";
          return;
        }
        recentList.innerHTML = "";
        for (const row of rows) {
          const div = document.createElement("div");
          div.className = "recent-item";
          const courseName = COURSE_NAMES[row.course] || `コース${row.course}`;
          const date = new Date(row.created_at).toLocaleString("ja-JP");
          div.innerHTML =
            `${row.song_name || row.title}（${courseName}） - ${row.score.toLocaleString()}点` +
            `<div class="meta">${row.source_pc || "不明"} / ${date}</div>`;
          recentList.appendChild(div);
        }
      } catch (err) {
        recentList.textContent = err.message;
      }
    }
  </script>
</body>
</html>
